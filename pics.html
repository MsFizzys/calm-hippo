  <style>
    :root {
      --green-deep:  #3b4a2f;
      --brown-deep:  #5c3d2e;
      --brown-mid:   #8b5e3c;
      --brown-light: #c49a6c;
      --orange-warm: #c9713a;
      --orange-light:#e8a96a;
      --cream:       #f7f2eb;
      --text-dark:   #2e2318;
      --text-mid:    #5a4535;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    img { max-width:100%; display:block; }

    body {
      background:
        radial-gradient(ellipse at 80% 10%, rgba(92,61,46,0.16) 0%, transparent 45%),
        radial-gradient(ellipse at 0% 60%, rgba(59,74,47,0.14) 0%, transparent 40%),
        radial-gradient(ellipse at 100% 80%, rgba(139,94,60,0.13) 0%, transparent 40%),
        radial-gradient(ellipse at 20% 100%, rgba(201,113,58,0.11) 0%, transparent 45%),
        var(--cream);
      color: var(--text-dark);
      font-family: 'Lora', serif;
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
      -webkit-text-size-adjust: 100%;
    }
    body::before {
      content:'';
      position:fixed;
      bottom:-5%; right:-5%;
      width:65%; height:100%;
      background-image:url('buddha.png');
      background-size:cover;
      background-position:center;
      filter:blur(3px) saturate(0.6) opacity(0.11);
      z-index:0;
      pointer-events:none;
    }
    header,footer,section,nav,main,div { position:relative; z-index:1; }

    /* HEADER */
    header { background: radial-gradient(ellipse at 20% 50%,#5c3d2e 0%,transparent 60%), radial-gradient(ellipse at 80% 30%,#3b2a1a 0%,transparent 55%), radial-gradient(ellipse at 55% 80%,#6b4423 0%,transparent 50%), radial-gradient(ellipse at 10% 10%,#2e3d22 0%,transparent 50%), radial-gradient(ellipse at 90% 90%,#7a3e1a 0%,transparent 45%), radial-gradient(ellipse at 50% 20%,rgba(232,200,160,0.22) 0%,transparent 45%), radial-gradient(ellipse at 35% 70%,rgba(247,230,200,0.15) 0%,transparent 40%), radial-gradient(ellipse at 70% 55%,rgba(138,158,106,0.18) 0%,transparent 40%), #1e1a12; overflow:hidden; }
    .header-motif { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; opacity:0.55; }
    .header-top { display:flex; justify-content:center; align-items:center; padding:20px 16px 12px; }
    .logo-wrap { display:inline-flex; align-items:center; justify-content:center; }
    .logo-img { height:100px; width:auto; max-width:280px; object-fit:contain; }
    .header-nav { display:flex; justify-content:space-evenly; align-items:center; flex-wrap:wrap; gap:2px; padding:8px 12px 16px; border-top:1px solid rgba(232,169,106,0.3); }
    .header-nav a { color:var(--cream); text-decoration:none; font-family:'Cormorant Garamond',serif; font-size:0.82rem; letter-spacing:0.09em; text-transform:uppercase; font-weight:300; padding:8px 6px; transition:color 0.3s; position:relative; white-space:nowrap; -webkit-tap-highlight-color:transparent; min-height:44px; display:inline-flex; align-items:center; }
    .header-nav a::after { content:''; position:absolute; bottom:4px; left:6px; right:6px; height:1px; background:var(--orange-light); transform:scaleX(0); transition:transform 0.3s; }
    .header-nav a:hover, .header-nav a.active { color:var(--orange-light); }
    .header-nav a:hover::after, .header-nav a.active::after { transform:scaleX(1); }

    /* PAGE TITLE */
    .page-title { text-align:center; padding:40px 20px 32px; }
    .page-title h1 { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300; letter-spacing:0.18em; text-transform:uppercase; color:var(--brown-deep); margin-bottom:12px; }
    .section-rule { width:60px; height:2px; background:linear-gradient(90deg,var(--orange-warm),var(--brown-light)); margin:0 auto; border-radius:2px; }

    /* MASONRY — mobile: 1 col */
    main { padding:0 16px 64px; max-width:1200px; margin:0 auto; }
    .masonry-grid { columns:1; column-gap:16px; }

    /* GALLERY ITEM */
    .gallery-item { break-inside:avoid; margin-bottom:16px; overflow:hidden; border-radius:10px; cursor:pointer; position:relative; box-shadow:0 4px 20px rgba(92,61,46,0.15); -webkit-tap-highlight-color:transparent; }
    .gallery-item img { width:100%; display:block; border-radius:10px; transition:transform 0.45s ease,filter 0.45s ease; transform-origin:center; }
    .gallery-item:hover img, .gallery-item:focus img { transform:scale(1.07); filter:brightness(1.05) saturate(1.1); }
    .gallery-item:focus { outline:2px solid var(--orange-light); outline-offset:2px; }
    .gallery-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(92,61,46,0.45) 0%,transparent 60%); opacity:0; transition:opacity 0.35s; border-radius:10px; display:flex; align-items:flex-end; justify-content:center; padding-bottom:16px; }
    .gallery-item:hover .gallery-overlay, .gallery-item:focus .gallery-overlay { opacity:1; }
    .gallery-overlay span { font-family:'Cormorant Garamond',serif; font-size:0.82rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--cream); opacity:0.9; }

    /* LIGHTBOX */
    .lightbox { display:none; position:fixed; inset:0; background:rgba(30,22,14,0.93); z-index:1000; justify-content:center; align-items:center; padding:24px; cursor:zoom-out; }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:90vw; max-height:85vh; object-fit:contain; border-radius:8px; box-shadow:0 20px 80px rgba(0,0,0,0.6); cursor:default; animation:lbFadeIn 0.3s ease; }
    @keyframes lbFadeIn { from{opacity:0;transform:scale(0.96)} to{opacity:1;transform:scale(1)} }
    .lightbox-close { position:absolute; top:16px; right:20px; color:var(--orange-light); font-size:2rem; cursor:pointer; font-family:'Cormorant Garamond',serif; font-weight:300; line-height:1; transition:color 0.2s; z-index:1001; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
    .lightbox-close:hover { color:var(--cream); }
    .lightbox-prev, .lightbox-next { position:absolute; top:50%; transform:translateY(-50%); background:rgba(196,154,108,0.2); border:1px solid rgba(196,154,108,0.4); color:var(--orange-light); font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:300; padding:10px 14px; cursor:pointer; border-radius:4px; transition:background 0.2s,color 0.2s; z-index:1001; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; }
    .lightbox-prev { left:12px; }
    .lightbox-next { right:12px; }
    .lightbox-prev:hover, .lightbox-next:hover { background:rgba(196,154,108,0.4); color:var(--cream); }

    /* BOOK NOW */
    .book-now-banner { background:var(--brown-deep); padding:44px 20px; text-align:center; }
    .book-now-banner h2 { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300; letter-spacing:0.08em; color:var(--cream); margin-bottom:8px; }
    .book-now-banner p { font-size:0.9rem; color:var(--brown-light); font-style:italic; margin-bottom:24px; }
    .btn-book { display:inline-block; background:var(--orange-warm); color:var(--cream); text-decoration:none; font-family:'Cormorant Garamond',serif; font-size:1rem; letter-spacing:0.13em; text-transform:uppercase; padding:14px 36px; border-radius:50px; transition:background 0.3s,transform 0.2s; -webkit-tap-highlight-color:transparent; min-height:48px; line-height:1.4; }
    .btn-book:hover { background:var(--brown-mid); transform:translateY(-2px); }

    /* FOOTER */
    footer { background: radial-gradient(ellipse at 15% 60%,#7a3e1a 0%,transparent 55%), radial-gradient(ellipse at 75% 30%,#5c3d2e 0%,transparent 50%), radial-gradient(ellipse at 45% 90%,#3b4a2f 0%,transparent 50%), radial-gradient(ellipse at 85% 80%,#8b5e3c 0%,transparent 45%), radial-gradient(ellipse at 5% 20%,#6b4423 0%,transparent 45%), #1e1a12; padding:28px 20px; text-align:center; overflow:hidden; }
    .footer-motif { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; opacity:0.5; }
    footer p { font-family:'Cormorant Garamond',serif; font-size:0.83rem; letter-spacing:0.07em; color:var(--brown-light); position:relative; z-index:2; }
    footer a { color:var(--orange-light); text-decoration:none; }

    /* TABLET — 2 cols */
    @media (min-width:600px) {
      .logo-img { height:110px; max-width:300px; }
      .header-nav a { font-size:0.92rem; letter-spacing:0.12em; }
      .masonry-grid { columns:2; column-gap:18px; }
      main { padding:0 24px 72px; }
    }

    /* DESKTOP — 3 cols */
    @media (min-width:900px) {
      .header-top { padding:28px 60px 16px; }
      .logo-img { height:120px; max-width:340px; }
      .header-nav { padding:10px 60px 20px; }
      .header-nav a { font-size:1.05rem; letter-spacing:0.14em; }
      .masonry-grid { columns:3; column-gap:20px; }
      main { padding:0 40px 80px; }
      .book-now-banner h2 { font-size:1.8rem; }
    }
  </style>
</head>
